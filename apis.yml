name: Google Search Ads 360 Reporting API
description: >-
  The Search Ads 360 Reporting API enables automated report downloading and
  programmatic access to search advertising campaign data across multiple search
  engines. It provides search and streaming methods for querying campaign,
  ad group, keyword, and conversion data using a SQL-like query language.
